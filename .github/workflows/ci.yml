name: CI

on:
  push:
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -e .
      - run: python -m py_compile web_app.py wiki_speedrun.py replay_benchmark.py diverse_benchmark.py src/wikispeedrun/solver.py
      - run: python tests/static_check.py
